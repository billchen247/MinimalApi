# ASP.NET
# Build and test ASP.NET projects.
# Add steps that publish symbols, save build artifacts, deploy, and more:
# https://docs.microsoft.com/azure/devops/pipelines/apps/aspnet/build-aspnet-4

trigger:
- main


variables:
  solution: '**/*.sln'
  buildPlatform: 'Any CPU'
  buildConfiguration: 'Release'
  version: '1.0.0.$(Build.BuildId)'  # ✅ Auto-increment with Build ID
  artifactName: 'minimalAPI'
  outputDir: '$(Build.ArtifactStagingDirectory)/publish'
  apiUrl: 'http://localhost/api/todoitems'

stages:

# =========================
# CI STAGE
# =========================
- stage: CI
  displayName: 'Build & Package'
  pool:
    vmImage: 'windows-latest'   # 👈 Microsoft-hosted agent
  jobs:
  - job: Build
    steps:
    - task: NuGetToolInstaller@1
    - task: NuGetCommand@2
      inputs:
        restoreSolution: '$(solution)'

    - task: UseDotNet@2
      displayName: 'Install .NET 8 SDK'
      inputs:
        packageType: 'sdk'
        version: '8.0.x'
    - task: DotNetCoreCLI@2
      displayName: Dotnet restore
      inputs:
        command: 'restore'
        projects: '**/*.csproj'


    # ---------------------------
    # SonarCloud Prepare
    # ---------------------------
    - task: SonarCloudPrepare@4
      displayName: 'Prepare SonarCloud Analysis'
      inputs:
        SonarCloud: 'sonarqubecloud'          # Your SonarCloud service connection
        organization: 'billchen247'         # SonarCloud org key
        #scannerMode: 'dotnet'                 # Changed from MSBuild -> dotnet
        dotnetScannerVersion: 11.2.0.135473
        projectKey: 'billchen247_MinimalApi'
        projectName: 'MinimalApi'
        #extraProperties: |
        #  sonar.coverageReportPaths=$(Agent.TempDirectory)/TestResults/coverage/coverage.cobertura.xml
      condition: succeeded()  # Only run if previous steps succeed

    # ---------------------------
    # Build & Test
    # ---------------------------
    - task: VSBuild@1
      inputs:
        solution: '$(solution)'
        msbuildArgs: '/p:DeployOnBuild=true /p:WebPublishMethod=Package /p:PackageAsSingleFile=true /p:SkipInvalidConfigurations=true /p:PackageLocation="$(build.artifactStagingDirectory)"'
        platform: '$(buildPlatform)'
        configuration: '$(buildConfiguration)'
        
    - task: DotNetCoreCLI@2
      inputs:
        command: test
        projects: '**/*Tests/*.csproj'
        arguments: '--configuration Release --filter TodoApiTests  /p:CollectCoverage=true /p:CoverletOutputFormat=cobertura /p:CoverletOutput=$(Agent.TempDirectory)/TestResults/coverage/coverage.cobertura.xml'

    # ---------------------------
    # Generate Coverage Report
    # ---------------------------
    - script: |
        dotnet tool install --global dotnet-reportgenerator-globaltool
        echo %USERPROFILE%\.dotnet\tools >> %PATH%

        reportgenerator ^
          -reports:$(Agent.TempDirectory)/**/coverage.cobertura.xml ^
          -targetdir:$(Build.ArtifactStagingDirectory)/CoverageReport ^
          -reporttypes:Html
      displayName: Generate HTML Report
      
    - task: PublishCodeCoverageResults@2
      inputs:
        codeCoverageTool: Cobertura
        summaryFileLocation: '$(Agent.TempDirectory)/**/coverage.cobertura.xml'
        reportDirectory: '$(Build.ArtifactStagingDirectory)/CoverageReport'
      displayName: Publish Code Coverage Report

    - task: PublishBuildArtifacts@1
      inputs:
        PathtoPublish: '$(Build.ArtifactStagingDirectory)/CoverageReport'
        ArtifactName: 'CoverageReport'
      displayName: Publish HTML code coverage report

    # ---------------------------
    # Extract Artifact Info
    # ---------------------------
    - powershell: |
        [xml]$csproj = Get-Content "Source/MinimalApi.csproj"
        $packageId = $csproj.Project.PropertyGroup.PackageId
        $packageVersion = $csproj.Project.PropertyGroup.Version

        if (-not $packageVersion) { $packageVersion = "1.0.0.$(Build.BuildId)" }  # Fallback version
        if (-not $packageId) { $packageId = "DefaultPackageName" }  # Fallback name

        $artifactFullName = "$packageId" + "_" + "$packageVersion"

        Write-Host "Package ID: $packageId"
        Write-Host "Package Version: $packageVersion"
        Write-Host "Artifact Name: $artifactFullName"

        # Set variables for later steps
        Write-Host "##vso[task.setvariable variable=artifactFullName]$artifactFullName"
      displayName: 'Extract & Print Artifact Name and Version'

    # ---------------------------
    # Publish Symbols
    # ---------------------------
    - task: PublishSymbols@2
      displayName: Publish symbols path
      continueOnError: True
      inputs:
        SearchPattern: '**\bin\**\*.pdb'
        PublishSymbols: false
        SymbolServerType: TeamServices
        
    # ---------------------------
    # Publish Build Artifacts
    # ---------------------------
    - task: PublishBuildArtifacts@1
      displayName: Publish Artifact
      condition: succeededOrFailed()
      inputs:
        PathtoPublish: $(Build.ArtifactStagingDirectory)
        ArtifactName: $(artifactFullName)  # ✅ Includes version
        TargetPath: '\\my\share\$(Build.DefinitionName)\$(Build.BuildNumber)_$(artifactFullName)'  # ✅ Versioned target path

    # ---------------------------
    # SonarCloud Analyze & Publish
    # ---------------------------
    - task: SonarCloudAnalyze@4
      displayName: 'Run SonarCloud Analysis'
      condition: succeeded()

    - task: SonarCloudPublish@4
      displayName: 'Publish SonarCloud Results'
      inputs:
        pollingTimeoutSec: '300'
      condition: and(succeeded(), ne(variables['Build.Reason'], 'PullRequest'))  # Skip for forked PRs

    # ✅ Fix: Specify output directory for .nupkg files
    - task: DotNetCoreCLI@2
      displayName: Dotnet Package
      inputs:
        command: 'pack'
        projects: '**/*.csproj'
        configuration: 'Release'
        arguments: '--output $(Build.ArtifactStagingDirectory) --property:Version=$(version)'

    # ✅ Fix: Ensure .nupkg files exist before pushing
    - task: NuGetCommand@2
      displayName: Push the nuget package to Feeds
      inputs:
        command: 'push'
        packagesToPush: '$(Build.ArtifactStagingDirectory)/**/*.nupkg'
        nuGetFeedType: 'internal'
        publishVstsFeed: c9f2b76d-54b1-4410-b1d0-876ea67ed0ad # comp367demofeeds

# =========================
# CD STAGE
# =========================
- stage: CD
  displayName: 'Deploy to IIS'
  dependsOn: CI
  condition: succeeded()
  pool:
    name: 'COMP367-Wins' # self host agent
  jobs:
  - deployment: DeployToLocalIIS   # 👈 change job → deployment
    displayName: 'Deploy to Local IIS'
    environment: 'local-iis'  # 👈 attach environment
    strategy:
      runOnce:
        deploy:
          steps:
      
          # Download the artifact from CI
          #- download: current
          #  artifact: $(artifactName)
          - task: DownloadPipelineArtifact@2
            displayName: 'Download pipeline artifact'
            inputs:
              artifact: '$(artifactName)'
              path: '$(Pipeline.Workspace)/$(artifactName)'
      
          # Pre-check: create IIS site if missing
          - powershell: |
              Import-Module WebAdministration
      
              $siteName = 'Default Web Site'
              $physicalPath = 'C:\inetpub\wwwroot'
      
              if (-not (Test-Path "IIS:\Sites\$siteName")) {
                  Write-Host "IIS site '$siteName' does not exist. Creating..."
                  New-Item IIS:\Sites\$siteName -PhysicalPath $physicalPath -BindingInformation "*:80:"
              } else {
                  Write-Host "IIS site '$siteName' exists. Updating..."
              }
            displayName: 'Pre-check / Create or Update IIS Site'
      
          # Deploy the web package
          - task: IISWebAppDeploymentOnMachineGroup@0
            displayName: 'Deploy to IIS'
            inputs:
              WebSiteName: 'Default Web Site'
              Package: '$(Pipeline.Workspace)/$(artifactName)/**/*.zip'
              TakeAppOfflineFlag: true
      
          # Post-deployment: restart IIS
          - powershell: |
              Write-Host "Restarting IIS..."
              Write-Host "API is restarting and should be available at: http://localhost/api/todoitems"
              iisreset
            displayName: 'Restart IIS'

          # Print first access page
          - powershell: |
              Write-Host "API is deployed and should be available at:"
              Write-Host "$(apiUrl)"
            displayName: 'Print API URL'

            