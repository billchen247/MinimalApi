# ASP.NET
# Build and test ASP.NET projects.
# Add steps that publish symbols, save build artifacts, deploy, and more:
# https://docs.microsoft.com/azure/devops/pipelines/apps/aspnet/build-aspnet-4

trigger:
- main

pool:
  vmImage: 'ubuntu-latest'

variables:
  solution: '**/*.sln'
  buildConfiguration: 'Release'
  version: '1.0.0.$(Build.BuildId)'

steps:

# Use .NET SDK
- task: UseDotNet@2
  inputs:
    packageType: 'sdk'
    version: '8.x'   # adjust if needed

# Restore
- task: DotNetCoreCLI@2
  displayName: Restore
  inputs:
    command: 'restore'
    projects: '$(solution)'

# Build (REPLACES VSBuild)
- task: DotNetCoreCLI@2
  displayName: Build
  inputs:
    command: 'build'
    projects: '$(solution)'
    arguments: '--configuration $(buildConfiguration)'

# Test + Coverage
- task: DotNetCoreCLI@2
  displayName: Test
  inputs:
    command: test
    projects: '**/*.csproj'
    arguments: '--configuration $(buildConfiguration) --collect:"XPlat Code Coverage"'

# Publish coverage
- task: PublishCodeCoverageResults@2
  inputs:
    codeCoverageTool: Cobertura
    summaryFileLocation: '$(Agent.TempDirectory)/**/coverage.cobertura.xml'

# Extract package info (use pwsh instead of powershell)
- task: PowerShell@2
  displayName: Extract Artifact Name
  inputs:
    pwsh: true
    targetType: 'inline'
    script: |
      [xml]$csproj = Get-Content "Source/MinimalApi.csproj"
      $packageId = $csproj.Project.PropertyGroup.PackageId
      $packageVersion = $csproj.Project.PropertyGroup.Version

      if (-not $packageVersion) { $packageVersion = "$(version)" }
      if (-not $packageId) { $packageId = "DefaultPackageName" }

      $artifactFullName = "$packageId" + "_" + "$packageVersion"

      Write-Host "##vso[task.setvariable variable=artifactFullName]$artifactFullName"

# Pack NuGet
- task: DotNetCoreCLI@2
  displayName: Pack
  inputs:
    command: 'pack'
    projects: '**/*.csproj'
    configuration: '$(buildConfiguration)'
    arguments: '--output $(Build.ArtifactStagingDirectory) /p:PackageVersion=$(version)'

# Publish artifacts (FIXED for Linux)
- task: PublishBuildArtifacts@1
  displayName: Publish Artifact
  inputs:
    PathtoPublish: '$(Build.ArtifactStagingDirectory)'
    ArtifactName: '$(artifactFullName)'

# Push NuGet
- task: NuGetCommand@2
  displayName: Push package
  inputs:
    command: 'push'
    packagesToPush: '$(Build.ArtifactStagingDirectory)/**/*.nupkg'
    nuGetFeedType: 'internal'
    publishVstsFeed: '8652216f-33ec-4cc4-912f-2fdda6d93168/ec7dd365-d6f2-4c11-a4e2-b5de5e9034c0'

