# --- Project Identification ---
sonar.projectKey=MinimalApi
sonar.organization=billchen247

# Optional — a nice display name in SonarCloud
sonar.projectName=MinimalApi

# --- Source Code ---
# All C# source files for the API
sonar.sources=Source

# --- Test Code ---
# Test project files
sonar.tests=Tests

# Dotnet tests inclusions (match common patterns)
sonar.test.inclusions=**/*Tests/*.cs, **/Tests/**/*.cs

# --- Coverage Reports ---
# Tell SonarCloud where CI generates coverage (Cobertura) reports
sonar.coverageReportPaths=$(Agent.TempDirectory)/**/coverage.cobertura.xml

# --- (Optional) Exclusions ---
# If you want to exclude generated or irrelevant files
#sonar.exclusions=**/obj/**,**/bin/**
